<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Video Cinematic - 视频电影模板</title>
<style>
:root {
  /* 尺寸 */
  --width: 1920;
  --height: 1080;
  --fps: 30;

  /* 字幕样式 */
  --subtitle-fontsize: 42;
  --subtitle-fontcolor: white@0.9;
  --subtitle-borderw: 1;
  --subtitle-bordercolor: black@0.4;
  --subtitle-position-y: h-100;
  --subtitle-bold: false;

  /* 标题样式 */
  --title-fontsize: 56;
  --title-fontcolor: white;
  --title-borderw: 2;
  --title-bordercolor: black@0.5;
  --title-position-y: 60;
  --title-duration: 4;

  /* 转场 */
  --transition-type: fadeblack;
  --transition-duration: 0.35;

  /* 视频处理 */
  --video-speed: 1.0;
  --video-overlay: gradient-black-20;
  --video-muted: true;
}
</style>
</head>
<body>
<!-- 模板预览布局 -->
<div class="preview-container" style="width: 100%; height: 100vh; background: black; position: relative;">
  <video class="background-video" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;" muted autoplay loop></video>
  <div class="overlay" style="position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.2));"></div>
  <div class="title" style="position: absolute; top: 60px; left: 50%; transform: translateX(-50%); font-size: 56px; color: white; letter-spacing: 6px;">标题文字</div>
  <div class="subtitle" style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); font-size: 42px; color: rgba(255,255,255,0.9);">字幕内容</div>
</div>
</body>
</html>
