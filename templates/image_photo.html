<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Image Photo - 图片照片模板</title>
<style>
:root {
  /* 尺寸 */
  --width: 1920;
  --height: 1080;
  --fps: 30;

  /* 字幕样式 */
  --subtitle-fontsize: 42;
  --subtitle-fontcolor: white;
  --subtitle-borderw: 2;
  --subtitle-bordercolor: black@0.6;
  --subtitle-position-y: h-150;
  --subtitle-bold: false;

  /* 标题样式 */
  --title-fontsize: 64;
  --title-fontcolor: white;
  --title-borderw: 3;
  --title-bordercolor: black@0.7;
  --title-position-y: 100;
  --title-duration: 3;

  /* 转场 */
  --transition-type: fade;
  --transition-duration: 0.30;

  /* Ken Burns 效果参数 */
  --kenburns-zoom-start: 1.0;
  --kenburns-zoom-end: 1.15;
  --kenburns-duration: full;

  /* 图片处理 */
  --image-blur: 0;
  --image-overlay: none;
}
</style>
</head>
<body>
<!-- 模板预览布局 -->
<div class="preview-container" style="width: 100%; height: 100vh; background: url('placeholder.jpg') center/cover; position: relative;">
  <div class="overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.3);"></div>
  <div class="title" style="position: absolute; top: 100px; left: 50%; transform: translateX(-50%); font-size: 64px; color: white;">标题文字</div>
  <div class="subtitle" style="position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); font-size: 42px; color: white;">字幕内容</div>
</div>
</body>
</html>
