<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Cinematic - 电影风格模板</title>
<style>
:root {
  /* 尺寸 */
  --width: 1920;
  --height: 1080;
  --fps: 30;

  /* 字幕样式 - 电影字幕风格 */
  --subtitle-fontsize: 42;
  --subtitle-fontcolor: white@0.9;
  --subtitle-borderw: 1;
  --subtitle-bordercolor: black@0.4;
  --subtitle-position-y: h-100;
  --subtitle-bold: false;

  /* 标题样式 */
  --title-fontsize: 56;
  --title-fontcolor: white;
  --title-borderw: 2;
  --title-bordercolor: black@0.5;
  --title-position-y: 60;
  --title-duration: 4;

  /* 转场 - 电影感 */
  --transition-type: dissolve;
  --transition-duration: 0.40;

  /* 背景调色板 */
  --palette-name: sunset;
  --palette-colors: #1a0a2e, #4a1942, #c94b4b;
}
</style>
</head>
<body>
<!-- 模板预览布局 -->
<div class="preview-container" style="width: 100%; height: 100vh; background: linear-gradient(to bottom, #1a0a2e, #c94b4b); display: flex; flex-direction: column; align-items: center; padding-top: 60px;">
  <div class="title" style="font-size: 56px; color: white; letter-spacing: 8px;">标题文字</div>
  <div class="subtitle" style="position: absolute; bottom: 100px; font-size: 42px; color: rgba(255,255,255,0.9);">字幕内容</div>
</div>
</body>
</html>
