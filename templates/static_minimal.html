<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Minimal - 极简风格模板</title>
<style>
:root {
  /* 尺寸 */
  --width: 1920;
  --height: 1080;
  --fps: 30;

  /* 字幕样式 */
  --subtitle-fontsize: 36;
  --subtitle-fontcolor: white;
  --subtitle-borderw: 0;
  --subtitle-bordercolor: transparent;
  --subtitle-position-y: h-120;
  --subtitle-bold: false;

  /* 标题样式 */
  --title-fontsize: 48;
  --title-fontcolor: white@0.9;
  --title-borderw: 1;
  --title-bordercolor: black@0.3;
  --title-position-y: 80;
  --title-duration: 3;

  /* 转场 */
  --transition-type: fade;
  --transition-duration: 0.35;

  /* 背景调色板 */
  --palette-name: minimal;
  --palette-colors: #0f0f0f, #1a1a2e, #16213e;
}
</style>
</head>
<body>
<!-- 模板预览布局 -->
<div class="preview-container" style="width: 100%; height: 100vh; background: linear-gradient(135deg, #0f0f0f, #1a1a2e); display: flex; flex-direction: column; align-items: center; justify-content: center;">
  <div class="title" style="font-size: 48px; color: white; margin-bottom: 200px;">标题文字</div>
  <div class="subtitle" style="font-size: 36px; color: rgba(255,255,255,0.85);">字幕内容</div>
</div>
</body>
</html>
