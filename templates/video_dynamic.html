<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Video Dynamic - 视频动感模板</title>
<style>
:root {
  /* 尺寸 */
  --width: 1920;
  --height: 1080;
  --fps: 30;

  /* 字幕样式 - 大字体 */
  --subtitle-fontsize: 52;
  --subtitle-fontcolor: white;
  --subtitle-borderw: 3;
  --subtitle-bordercolor: black@0.7;
  --subtitle-position-y: h-150;
  --subtitle-bold: true;

  /* 标题样式 */
  --title-fontsize: 64;
  --title-fontcolor: white;
  --title-borderw: 3;
  --title-bordercolor: black@0.7;
  --title-position-y: 100;
  --title-duration: 3;

  /* 转场 - 快速动感 */
  --transition-type: zoomin;
  --transition-duration: 0.15;

  /* 视频处理 */
  --video-speed: 1.0;
  --video-overlay: none;
  --video-muted: true;
}
</style>
</head>
<body>
<!-- 模板预览布局 -->
<div class="preview-container" style="width: 100%; height: 100vh; background: black; position: relative;">
  <video class="background-video" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;" muted autoplay loop></video>
  <div class="title" style="position: absolute; top: 100px; left: 50%; transform: translateX(-50%); font-size: 64px; color: white; font-weight: bold;">标题文字</div>
  <div class="subtitle" style="position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); font-size: 52px; color: white; font-weight: bold;">字幕内容</div>
</div>
</body>
</html>
