<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Impact - 冲击力风格模板</title>
<style>
:root {
  /* 尺寸 */
  --width: 1920;
  --height: 1080;
  --fps: 30;

  /* 字幕样式 - 大字体，粗边框 */
  --subtitle-fontsize: 52;
  --subtitle-fontcolor: white;
  --subtitle-borderw: 3;
  --subtitle-bordercolor: black@0.7;
  --subtitle-position-y: h-150;
  --subtitle-bold: true;

  /* 标题样式 */
  --title-fontsize: 64;
  --title-fontcolor: white;
  --title-borderw: 3;
  --title-bordercolor: black@0.7;
  --title-position-y: 100;
  --title-duration: 3;

  /* 转场 - 快速动感 */
  --transition-type: zoomin;
  --transition-duration: 0.12;

  /* 背景调色板 */
  --palette-name: neon;
  --palette-colors: #0a0a1a, #1a0a3e, #e94560;
}
</style>
</head>
<body>
<!-- 模板预览布局 -->
<div class="preview-container" style="width: 100%; height: 100vh; background: linear-gradient(135deg, #0a0a1a, #e94560); display: flex; flex-direction: column; align-items: center; justify-content: center;">
  <div class="title" style="font-size: 64px; color: white; font-weight: bold; text-shadow: 0 0 10px #e94560; margin-bottom: 180px;">标题文字</div>
  <div class="subtitle" style="font-size: 52px; color: white; font-weight: bold; border: 3px solid rgba(0,0,0,0.7);">字幕内容</div>
</div>
</body>
</html>
